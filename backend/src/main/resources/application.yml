server:
  port: 8080

spring:
  application:
    name: marketplace
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

# JWT Secret config
app:
  jwt:
    secret: ${JWT_SECRET:8f7e6d5c4b3a219018273645abcdfeeefddeedddccbbbaa99887766554433221}
    expiration: 86400000 # 24 hours

springdoc:
  swagger-ui:
    path: /swagger-ui.html
